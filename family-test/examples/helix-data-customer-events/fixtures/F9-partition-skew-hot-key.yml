  - The data-architecture artifact explains the Redshift DISTKEY choice for fact_events.
  - The data-design artifact names ENT-00471 as the high-volume tenant fixture.
  - The runbook artifact includes a Redshift slice-skew diagnostic query.
  - The worked example records the 41 percent volume share and 12x runtime regression.
  - The data-architecture artifact proposes a mitigation when customer_id is too skewed for DISTKEY use.
