# MT05 — matcher argument is in banned-patterns list (vacuous matcher).
# exact_text='helix' is in banned_text_patterns (flow-name-only attribution).
# Runner MUST reject with T047.
meta_test:
  id: MT05
  expected_rejection: T047
discriminator:
  assertion_id: literal_or_banner_text
