id: lineage-spec
title: Lineage Spec
version: 1.0.0
owner_flow: helix-data
purpose: Specifies how lineage events are emitted, which pipeline nodes are represented, and which system consumes the lineage graph.
required_sections:
  - emitter_strategy
  - nodes_to_emit
  - consumer_of_lineage
optional_sections:
  - metadata_fields
  - privacy_constraints
validator_notes: T-class validation checks that emitter strategy names a supported pattern, nodes are enumerated, and the lineage consumer is identified.
