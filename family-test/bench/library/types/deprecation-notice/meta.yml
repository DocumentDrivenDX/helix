id: deprecation-notice
title: Deprecation Notice
owner_flow: helix-data
purpose: Announces the retirement of a data artifact, names its successor, identifies affected consumers, and fixes the final decommission date.
required_sections:
  - artifact_being_deprecated
  - successor
  - consumers_affected
  - timeline
  - final_decommission_date
optional_sections:
  - support_contact
  - exception_process
validator_notes: T-class validation checks that the deprecated artifact and successor are named, consumers and timeline are concrete, and final_decommission_date is present.
