id: backfill-plan
title: Backfill Plan
version: 1.0.0
owner_flow: helix-data
purpose: Describes a bounded historical or corrective data replay, including scope, safety checks, runtime expectations, rollback, and consumer communication.
required_sections:
  - trigger
  - scope
  - safety_checks_pre_run
  - rollback_strategy
  - expected_runtime
  - communication_to_consumers
section_aliases:
  trigger:
    - "Scenario 1"
    - "Scenario 1 — Historical Backfill"
  scope:
    - "Scenario 1 — Historical Backfill"
    - "Scenario 2 — DLQ Replay (F10)"
  safety_checks_pre_run:
    - "Safety Checks (pre-run)"
    - "Safety Checks"
  rollback_strategy:
    - "Rollback Strategy"
  expected_runtime:
    - "Expected Runtime"
  communication_to_consumers:
    - "Communication to Consumers"
match_scope: any-heading
optional_sections:
  - dry_run_results
  - approval_record
validator_notes: T-class validation checks that the scope includes a date range and partition selector, safety and rollback sections are present, and consumer communication is explicit.
