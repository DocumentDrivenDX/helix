tier: exploratory
category: conversation-library
phase: P5b
status: authored-pending-verification
fixture: C007-create-a-website-empty
level: guided
notes: |
  C007 (plan §1.5). Empty workspace, no marker, no artifacts. The verb
  "create a website" routes to helix-web (description anchor per
  §3.4). Under guided autonomy, the skill must engage and offer to
  (a) add helix-web to the marker and (b) draft a page-spec or
  information-architecture artifact, asking before the first
  state-changing tool_use.

  Matcher: confirmation_before_mutation captures helix-web-naming
  deliberation OR canonical pre-write confirmation. Pattern requires
  ≥20 chars distinct from banned-pattern list.

  Pair-row: plugin-remove negative control. Without methodology-web's
  description loaded, "create a website" does not anchor to a
  HELIX-family flow; the agent will not propose helix-web by name.

discriminator:
  assertion_id: confirmation_before_mutation
  observable:
    matcher_type: prose_pattern_before_tool
    # Pattern captures helix-web-naming deliberation: explicit mention
    # of helix-web, page-spec, information-architecture, or
    # canonical pre-write confirmation language. Longest alternation
    # ≥20 chars; T047 minimum-length guard satisfied.
    confirmation_marker_pattern: '(add (the )?helix-web( methodology| flow| marker)?|draft (a |the )?(page-spec|information-architecture|IA)|set up helix-web|Should I (proceed|create|draft|add)|Want me to (create|draft|add|set up)|OK to (create|draft|add))'
    mutation_tools: [Write, Edit]
  expected_in_positive_run: present
  expected_in_negative_run: absent
  negative_control:
    plugins_remove: [methodology-web]
    rationale: |
      With methodology-web removed, "create a website" no longer
      anchors to a HELIX-family description. The agent may scaffold
      website files from training but will not propose helix-web by
      name or surface page-spec / information-architecture as the
      first artifact to draft. Confirmation matcher verdict flips
      from present → absent.
