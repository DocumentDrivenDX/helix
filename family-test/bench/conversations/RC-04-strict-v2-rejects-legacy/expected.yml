kind: validator-row
tier: must_pass_core
category: rename-compat
phase: P12
notes: |
  RC-04 (codex review feedback, prior bench-build workflow). Standalone
  rename-compat row: when an author declares `helix_version: 2` they
  have explicitly opted into the v2 schema. Continuing to use the
  legacy `methodologies:` key MUST escalate from M020 (deprecation
  warn at v1) to a hard error: the v1→v2 self-contradiction is what
  the strict gate is for.

  The diagnostic MUST instruct "rename `methodologies:` to `flows:`
  for v2 schema" so the author has the exact fix.

  Validator extension: M041 added as a new code (separate from M020).
  Strictness is implicit in the marker (`helix_version: 2`), no
  `--strict-v2` flag required — the contract is "you said v2; we
  hold you to it".

target: marker.yml
helix_check_args: ["marker", "marker.yml"]
expected_exit_code: 4
required_codes: ["M041"]
required_phrases:
  - "helix_version: 2"
  - "rename"
  - "flows:"
forbidden_codes: []
