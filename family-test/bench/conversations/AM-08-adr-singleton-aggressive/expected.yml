tier: must_pass_core
category: autonomy-matrix
phase: P3
status: authored-pending-verification
fixture: B-adr-singleton
level: aggressive
notes: |
  AM-08 (fixture B × level aggressive). Marker active (helix), no upstream
  prereqs needed for an ADR. Prompt asks for an ADR. Under aggressive the
  skill behaves as autonomous on this fixture: there are no declared
  prerequisites to march through, so the agent reads context and drafts
  the ADR directly. No confirmation prompt before mutation.

  This row is intentionally similar to AM-07 (autonomous on the same
  fixture) — the level matrix asserts aggressive ⊇ autonomous on
  no-prereq fixtures, and aggressive > autonomous (more silent writes)
  on cascade fixtures (AM-04 vs AM-03).

discriminator:
  assertion_id: confirmation_before_mutation
  observable:
    matcher_type: prose_pattern_before_tool
    confirmation_marker_pattern: '(OK to proceed|Should I proceed|Want me to|Shall I|Do you want me to)\b'
    mutation_tools: [Write, Edit, Bash]
  expected_in_positive_run: absent
  expected_in_negative_run: present
  negative_control:
    autonomy_swap:
      from: autonomy.yml
      to: ../AM-05-adr-singleton-manual/autonomy.yml
      rationale: |
        Swap autonomy from `aggressive` to `manual`. The agent MUST emit a
        confirmation prompt before any tool use; verdict flips from absent
        to present.
