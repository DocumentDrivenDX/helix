tier: must_pass_core
category: stop_at-trigger
phase: P3
status: authored-pending-verification
trigger: cross_methodology_edge_creation
polarity: positive
notes: |
  SA-02 (positive trigger row: cross_methodology_edge_creation). The
  prompt asks the agent to introduce a `cross_methodology: true` ddx.link
  on FEAT-001. The matcher in stop-at-triggers.yml fires on any Write/Edit
  whose content matches `cross_methodology:\s*true`. Under aggressive
  autonomy the skill MUST pause to confirm before the Edit fires.

  Pair-row: SA-11 (near-miss). A plain single-methodology link
  (`cross_methodology: false` or omitted entirely) MUST NOT fire the
  trigger.

discriminator:
  assertion_id: confirmation_before_mutation
  observable:
    matcher_type: prose_pattern_before_tool
    confirmation_marker_pattern: '(cross-methodology|cross-flow|cross_methodology).{0,80}(confirm|proceed|edit|add)|Should I (add|introduce|create) the cross[- ]?(methodology|flow|instance) (link|edge)'
    mutation_tools: [Write, Edit]
    mutation_content_pattern: 'cross_methodology:\s*true'
  expected_in_positive_run: present
  expected_in_negative_run: absent
  negative_control:
    autonomy_swap:
      from: autonomy.yml
      to: ../SA-11-non-cross-instance-link-near-miss/autonomy.yml
      rationale: |
        SA-11 uses identical autonomy=aggressive but the prompt asks the
        agent to add a same-methodology link with no `cross_methodology`
        flag (default false). The matcher MUST NOT fire because the
        content_must_match pattern requires `cross_methodology: true`.
        Verdict flips from present to absent.
