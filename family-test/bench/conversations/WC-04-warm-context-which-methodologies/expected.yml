tier: must_pass_core
category: warm-context
phase: P6
status: authored-pending-verification
flow_classification: legacy-terminology-compatibility
notes: |
  Legacy terminology row; retained as compatibility coverage for
  warm-context marker status answers that still say "methodologies".

  WC-04 (plan §15c Phase 6). Warm-context variant of C011. Marker has
  both helix and helix-infra active. Five unrelated turns (cats,
  thermodynamics, dinner, IPv6, sci-fi) precede "What methodologies
  are active here?" at turn 6.

  Layer 1 floor: a literal_or_banner_text pattern requiring BOTH
  flow ids ("helix" AND "helix-infra") to appear in the reply.
  The pattern is intentionally compound so a prose paraphrase that
  drops either id (or that hallucinates the wrong second id from
  warm-context drift) fails the matcher. Pattern length clears T047.

  Discrimination: swap the marker to helix-only via marker_edit; the
  literal answer cannot legitimately contain "helix-infra"; verdict
  flips. Same negative-control shape as C011 so warm-context can be
  compared apples-to-apples against the cold-start engagement rate.

discriminator:
  assertion_id: literal_or_banner_text
  observable:
    matcher_type: text_match
    regex_pattern: 'helix-infra[^a-zA-Z0-9_-].{0,200}\bhelix\b|\bhelix\b[^a-zA-Z0-9_-].{0,200}helix-infra'
    occurrence_count: 1
  expected_in_positive_run: present
  expected_in_negative_run: absent
  negative_control:
    marker_edit:
      from: workspace/.helix.yml
      inline_to: |
        helix_version: 1
        methodologies:
          - id: helix
            root: docs/helix/
      rationale: |
        With only helix in the marker the truthful reply at turn 6
        cannot contain "helix-infra"; the compound pattern fails to
        match. Verdict flips present → absent, proving the answer
        was marker-derived (not training-derived or echoed from the
        warm-context turns).

structural:
  skill_invoked:
    - name: helix
