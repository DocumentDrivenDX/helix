id: data-product-brief
name: Data Product Brief
version: 1.0.0
summary: |
  Defines the target users, sources, freshness, success measures, and boundaries for a data product.

required_sections:
  - problem
  - consumers
  - data_sources
  - freshness_sla
  - success_metrics
  - non_consumers
  - open_questions

section_aliases:
  non_consumers:
    - "Non-Consumers (out of scope)"
    - "Non-Consumers"
    - "Out of Scope"

quality_checks:
  - id: consumers_and_sla_specific
    description: Consumers and freshness SLA name concrete systems, cadences, and measurable targets.
    severity: blocking

prompts:
  generation: prompt.md

template:
  file: template.md

tags: [data, helix-data, product]
