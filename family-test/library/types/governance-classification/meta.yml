id: governance-classification
name: Governance Classification
version: 1.0.0
summary: |
  Classifies privacy, access, retention, residency, and audit requirements for a data product.

required_sections:
  - pii_fields
  - access_tier
  - retention_policy
  - residency_constraints
  - audit_log_requirements

quality_checks:
  - id: governance_controls_actionable
    description: Classification lists concrete PII fields and actionable access, retention, residency, and audit controls.
    severity: blocking

prompts:
  generation: prompt.md

template:
  file: template.md

tags: [data, helix-data, governance]
