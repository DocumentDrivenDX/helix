id: data-contract
name: Data Contract
version: 1.0.0
summary: |
  Defines producer-consumer obligations for schema, semantics, freshness, evolution, and termination.

required_sections:
  - producer
  - consumer
  - schema_versioning_policy
  - semantic_field_definitions
  - freshness_sla
  - evolution_policy
  - termination_clauses

section_aliases:
  consumer:
    - "Consumers"
  evolution_policy:
    - "Evolution Policy"
    - "Evolution Policy (breaking / non-breaking surface)"

quality_checks:
  - id: contract_obligations_testable
    description: Contract names both parties and states testable schema, semantic, freshness, evolution, and termination obligations.
    severity: blocking

prompts:
  generation: prompt.md

template:
  file: template.md

tags: [data, helix-data, contract]
