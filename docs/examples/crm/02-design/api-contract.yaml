  # ==================== ACTIVITY ENDPOINTS ====================

  /activities:
    get:
      tags:
        - Activities
      summary: List activities
      operationId: listActivities
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: record_type
          in: query
          schema:
            type: string
            enum: [contact, account, opportunity]
          description: Filter by record type
        - name: record_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter activities for a specific record
        - name: kind
          in: query
          schema:
            type: string
            enum: [call, email, meeting, note]
          description: Filter by activity type
      responses:
        200:
          description: List of activities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Activity"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Activities
      summary: Create a new activity
      operationId: createActivity
      security:
        - BearerAuth: []
      description: |
        Create an activity log entry. Activities are immutable after creation (no PUT/PATCH in MVP).
        `author_id` defaults to the current user.
        `occurred_at` can be a past timestamp (e.g., log a call from yesterday).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - kind
                - record_type
                - record_id
                - occurred_at
              properties:
                kind:
                  type: string
                  enum: [call, email, meeting, note]
                body:
                  type: string
                  description: Activity notes or summary
                author_id:
                  type: string
                  format: uuid
                  description: Defaults to current user if omitted
                occurred_at:
                  type: string
                  format: date-time
                  description: When the activity occurred (may be in the past)
                record_type:
                  type: string
                  enum: [contact, account, opportunity]
                record_id:
                  type: string
                  format: uuid
                email_thread_id:
                  type: string
                  description: Normalized email thread ID for deduplication (P1)
      responses:
        201:
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        404:
          description: Referenced record (contact/account/opportunity) not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

