          schema:
            type: integer
            default: 0
      responses:
        200:
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                results:
                  - type: "contact"
                    id: "123e4567-e89b-12d3-a456-426614174000"
                    name: "John Doe"
                    email: "john@example.com"
                    account_name: "Acme Corp"
                  - type: "account"
                    id: "223e4567-e89b-12d3-a456-426614174000"
                    name: "TechCorp Inc"
                  - type: "opportunity"
                    id: "323e4567-e89b-12d3-a456-426614174000"
                    name: "TechCorp Enterprise Deal"
                    account_name: "TechCorp Inc"
                    owner_id: "423e4567-e89b-12d3-a456-426614174000"
                pagination:
                  limit: 20
                  offset: 0
                  total: 42
                  has_more: true
        400:
          description: Missing or empty search query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== IMPORT ENDPOINTS ====================

  /import/preview:
    post:
      tags:
        - Import
      summary: Preview CSV file before import
      operationId: importPreview
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file upload
      responses:
        200:
          description: CSV preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreviewResponse"
        400:
          description: Invalid file format (not CSV)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        403:
          description: Forbidden (admin only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        413:
          description: File too large (max 10MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /import/commit:
    post:
      tags:
        - Import
      summary: Commit CSV import
      operationId: importCommit
      security:
        - BearerAuth: []
      description: |
        Import records from previously uploaded CSV. Validates data, auto-links contacts to accounts
        by company name match (case-insensitive). Partial success allowed; failed rows reported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCommitRequest"
      responses:
        200:
          description: Import complete (with results and errors)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCommitResponse"
              example:
                success_count: 998
                error_count: 2
                errors:
                  - row_number: 5
                    field: "email"
                    message: "Invalid email address"
                  - row_number: 42
                    field: "name"
                    message: "Name is required"
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        403:
          description: Forbidden (admin only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== EXPORT ENDPOINT ====================

  /export:
    get:
      tags:
        - Export
      summary: Export records as CSV
      operationId: export
      security:
        - BearerAuth: []
      parameters:
        - name: record_type
          in: query
          required: true
          schema:
            type: string
            enum: [contacts, accounts, leads, opportunities, activities]
          description: Type of records to export
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
          description: Include soft-deleted records (admin only)
      responses:
        200:
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
              example: |
                id,name,email,account_id,created_at,updated_at
                123e4567-e89b-12d3-a456-426614174000,John Doe,john@example.com,223e4567-e89b-12d3-a456-426614174000,2026-05-01T10:00:00Z,2026-05-15T14:30:00Z
                323e4567-e89b-12d3-a456-426614174000,Jane Smith,jane@example.com,223e4567-e89b-12d3-a456-426614174000,2026-05-02T11:00:00Z,2026-05-16T09:45:00Z
        400:
          description: Invalid record_type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        403:
          description: Forbidden (insufficient permissions)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

security:
  - BearerAuth: []
