  # ==================== PIPELINE ENDPOINT ====================

  /pipeline:
    get:
      tags:
        - Pipeline
      summary: Get pipeline view (kanban data)
      operationId: getPipeline
      security:
        - BearerAuth: []
      description: |
        Returns opportunities grouped by stage (kanban columns). Rep view shows only own opportunities.
        Manager view shows team opportunities. Response format: { "stage": [ card, card, ... ] }
      responses:
        200:
          description: Pipeline view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineResponse"
              example:
                stages:
                  prospect:
                    - id: "123e4567-e89b-12d3-a456-426614174000"
                      name: "Deal Name"
                      account_name: "Acme Corp"
                      owner_id: "223e4567-e89b-12d3-a456-426614174000"
                      value: 50000.00
                      close_date: "2026-06-30"
                      next_step_date: "2026-05-20"
                      is_overdue: false
                  qualified:
                    - id: "323e4567-e89b-12d3-a456-426614174000"
                      name: "Another Deal"
                      account_name: "TechCorp"
                      owner_id: "223e4567-e89b-12d3-a456-426614174000"
                      value: 75000.00
                      close_date: "2026-07-15"
                      next_step_date: "2026-05-25"
                      is_overdue: true
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

