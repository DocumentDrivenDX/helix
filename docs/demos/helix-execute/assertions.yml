slug: helix-execute
min_duration_s: 7
min_assistant_chars: 150

expect:
  - kind: narration
    contains: "DDx owns the runtime handoff"
  - kind: prompt
    contains_all:
      - "DDx execution pass"
      - "bead-001"
  - kind: tool_call
    name: Bash
    args_contain:
      command: "ddx bead execute"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "beads.jsonl"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "FEAT-001-csv-ingest.md"
  - kind: tool_call
    name: Write
    args_contain:
      file_path: "schema-mapping.yaml"
  - kind: tool_call
    name: Write
    args_contain:
      file_path: "header_sniffer_test.go"
  - kind: tool_call
    name: Bash
    args_contain:
      command: "go test"
  - kind: assistant
    contains_all:
      - "DDx execution completed"
      - "OWASP A03"
      - "3 fixtures"
      - "Scope held to bead-001"
