name: Release skill bundles

# Publishes generated HELIX skill bundles as GitHub release assets on every tag
# push (v*). The Genie asset is consumed by `scripts/genie-install`, which
# prefers a pre-built bundle over building from source. The plugin package
# provides a self-contained Claude/Codex layout with generated references/
# output, without checking those generated bytes into source.
#
# Outputs per release:
#   helix-genie-bundle-<tag>.tar.gz   # the skill bundle (helix/SKILL.md
#                                       + helix/references/...)
#   helix-plugin-package-<tag>.tar.gz # Claude/Codex plugin package
#   genie-install                     # the installer script (so users
#                                       can curl it from a stable URL)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to attach assets to a release

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag name
        id: tag
        run: echo "ref_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build Genie bundle
        run: bash scripts/build-genie-bundle.sh

      - name: Build Claude/Codex plugin package
        run: bash scripts/build-plugin-package.sh

      - name: Verify bundle layout
        run: |
          test -f dist/genie-bundle/helix/SKILL.md
          test -d dist/genie-bundle/helix/references/activities
          test -d dist/genie-bundle/helix/references/concerns
          test -f dist/genie-bundle/helix/references/graph.yml
          test -f dist/genie-bundle/helix/references/voice.yml
          for activity in 00-discover 01-frame 02-design 03-test 04-build 05-deploy 06-iterate; do
            test -d dist/genie-bundle/helix/references/activities/$activity
          done
          test -f dist/plugin-package/helix/.claude-plugin/plugin.json
          test -f dist/plugin-package/helix/.codex-plugin/plugin.json
          test -f dist/plugin-package/helix/skills/helix/SKILL.md
          test -d dist/plugin-package/helix/skills/helix/references/activities
          test -d dist/plugin-package/helix/skills/helix/references/concerns
          test -f dist/plugin-package/helix/skills/helix/references/graph.yml
          bash tests/validate-plugin-package.sh
          file_count=$(find dist/genie-bundle/helix -type f | wc -l)
          echo "bundle: $file_count files"
          test "$file_count" -ge 200

      - name: Pack tarball
        run: |
          mkdir -p dist/release
          tar -czf dist/release/helix-genie-bundle-${{ steps.tag.outputs.ref_name }}.tar.gz \
            -C dist/genie-bundle helix
          tar -czf dist/release/helix-plugin-package-${{ steps.tag.outputs.ref_name }}.tar.gz \
            -C dist/plugin-package helix
          cp scripts/genie-install dist/release/genie-install
          ls -la dist/release

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref_name }}
          files: |
            dist/release/helix-genie-bundle-${{ steps.tag.outputs.ref_name }}.tar.gz
            dist/release/helix-plugin-package-${{ steps.tag.outputs.ref_name }}.tar.gz
            dist/release/genie-install
          fail_on_unmatched_files: true
          body: |
            HELIX ${{ steps.tag.outputs.ref_name }} generated skill bundles.

            `helix-plugin-package-${{ steps.tag.outputs.ref_name }}.tar.gz` is the
            self-contained Claude/Codex plugin package with generated
            `skills/helix/references/` output.

            ## Install (user-scoped, no admin)

            ```bash
            export DATABRICKS_HOST=https://<your-workspace>.azuredatabricks.net
            export DATABRICKS_TOKEN=<personal access token>
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.ref_name }}/genie-install -o /tmp/genie-install
            chmod +x /tmp/genie-install
            /tmp/genie-install
            ```

            ## Workspace-wide (admin)

            Add `--shared` to the final command.

            See [docs/install/databricks-genie.md](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.ref_name }}/docs/install/databricks-genie.md)
            for the full guide.
