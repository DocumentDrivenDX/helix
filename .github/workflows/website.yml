name: Website

on:
  push:
    branches: [main]
    paths: &website_paths
      - 'website/**'
      - 'docs/website/**'
      - 'scripts/generate-reference.py'
      - 'scripts/publish-artifacts.py'
      - 'scripts/publish-resources.py'
      - 'scripts/check-website-links.py'
      - 'scripts/helix_validate_artifact_meta.py'
      - 'tests/validate-website-generated.sh'
      - 'workflows/activities/**/artifacts/**'
      - '.vale.ini'
      - '.vale/**'
      - '.github/workflows/website.yml'
  pull_request:
    branches: [main]
    paths: *website_paths

jobs:
  website-checks:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.159.2"
      VALE_VERSION: "3.0.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # generator drift gate diffs against committed output

      - name: Install Hugo
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Vale
        run: |
          curl -sfL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vale

      - name: Install Playwright + browsers
        working-directory: website
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Lint prose (Vale)
        run: vale docs/website/content

      - name: Generator drift + coverage gate
        run: bash tests/validate-website-generated.sh

      - name: Validate artifact-type schemas
        run: uv run scripts/helix_validate_artifact_meta.py

      - name: Build site (Hugo)
        working-directory: website
        # Build with the production base path so the link check validates the
        # real /helix/-prefixed URLs; a plain root build hides base-path bugs
        # like raw card links that bypass the baseURL.
        run: hugo --gc --minify --baseURL "https://documentdrivendx.github.io/helix/"

      - name: Check internal links + images
        run: python3 scripts/check-website-links.py

      - name: End-to-end + accessibility (Playwright + axe)
        working-directory: website
        env:
          CI: "1"  # forces a fresh server so a stale one cannot mask content drift
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report
          retention-days: 7
