baseURL: https://documentdrivendx.github.io/helix/
locale: en-us
title: HELIX

module:
  imports:
    - path: github.com/imfing/hextra
  # Content source is isolated under docs/website/content (see that dir's
  # CLAUDE.md). Declaring mounts replaces Hugo's defaults, so the project's
  # other component dirs are listed explicitly alongside the relocated content.
  mounts:
    - source: ../docs/website/content
      target: content
    - source: assets
      target: assets
    - source: layouts
      target: layouts
    - source: static
      target: static

enableRobotsTXT: true
enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Install
      pageRef: /install
      weight: 0
    - name: Why HELIX
      pageRef: /why
      weight: 1
    - name: Use HELIX
      pageRef: /use
      weight: 2
    - name: Types
      pageRef: /artifact-types
      weight: 3
    - name: Concerns
      pageRef: /concerns
      weight: 4
    - name: Platforms
      pageRef: /platforms
      weight: 5
    - name: Reference
      pageRef: /reference
      weight: 6
    - name: GitHub
      url: https://github.com/DocumentDrivenDX/helix
      weight: 10
      params:
        icon: github

params:
  description: A document-driven methodology and artifact catalog that keeps AI-assisted software development aligned across vision, design, tests, and code.

  navbar:
    displayTitle: true
    displayLogo: false

  page:
    width: wide

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: false
