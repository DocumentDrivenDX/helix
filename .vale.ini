StylesPath = .vale/styles
MinAlertLevel = suggestion

# Prose-quality rules apply to the hand-authored narrative under the site
# content tree. Code spans and markdown link targets are ignored so slugs and
# URLs do not trip the word rules.
[docs/website/content/**/*.md]
BasedOnStyles = Helix
TokenIgnores = (`[^`]+`), (\]\(<[^>]+>\)), (\]\([^)]+\))

# Generated and published trees are projections of upstream sources
# (workflows/, docs/helix/, docs/resources/) and are governed there, not here.
[docs/website/content/{artifact-types,concerns,artifacts,research}/**/*.md]
BasedOnStyles = ''
