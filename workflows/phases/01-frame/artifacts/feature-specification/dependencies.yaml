# Feature Specification Dependencies

artifact:
  name: Feature Specification
  id: feature-specification
  type: collection
  phase: frame

description: |
  Per-feature requirements document defining scope, functional and
  non-functional requirements, and success metrics. References user stories
  by ID — stories are separate governing artifacts with their own lifecycle.

dependencies:
  requires:
    - input: PRD
      type: artifact
      path: prd
      required: true
      relationship: "derives features from requirements"

  enables:
    - output: User Stories
      type: artifact
      path: user-stories
      relationship: "stories implement feature slices"
    - output: Solution Design
      type: artifact
      phase: design
      relationship: "guides solution design"

output:
  location: docs/helix/01-frame/features/
  format: markdown
  naming: FEAT-{number}-{name}.md

validation:
  required_sections:
    - overview
    - problem_statement
    - functional_requirements
    - non_functional_requirements
    - user_stories
    - success_metrics
    - dependencies

  quality_checks:
    - check: prd_linked
      description: Overview links to a specific PRD requirement
      severity: blocking

    - check: requirements_testable
      description: Every functional requirement is testable
      severity: blocking

    - check: nfr_numeric
      description: Non-functional requirements have specific numeric targets
      severity: blocking

    - check: stories_by_reference
      description: User stories referenced by ID, not duplicated inline
      severity: blocking

    - check: no_unresolved_markers
      description: No [NEEDS CLARIFICATION] markers remain
      severity: blocking

    - check: edge_cases_present
      description: At least one feature-level edge case documented
      severity: warning

    - check: metrics_feature_specific
      description: Success metrics are feature-specific, not product-level
      severity: warning

workflow:
  creation_order: 2
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Product Owner
    - Technical Lead

relationships:
  derived_from:
    - prd
  informs:
    - user-stories
    - solution-design

tags:
  - requirements
  - scope
  - feature
