# User Stories Dependencies

artifact:
  name: User Stories
  id: user-stories
  type: collection
  phase: frame

description: |
  Standalone design artifacts defining vertical slices of the application.
  Each story is a stable reference used by tracker issues across design,
  implementation, and testing phases. One file per story.

dependencies:
  requires:
    - input: PRD
      type: artifact
      path: prd
      required: true
      relationship: "derives from requirements and personas"
    - input: Feature Specifications
      type: artifact
      path: feature-specification
      required: true
      relationship: "breaks down features into implementable slices"

  enables:
    - output: Solution Design
      type: artifact
      phase: design
      relationship: "stories inform design decisions"
    - output: Test Cases
      type: artifact
      phase: test
      relationship: "acceptance criteria drive test cases"
    - output: Tracker Issues
      type: tracker
      phase: build
      relationship: "implementation beads reference stories"

output:
  location: docs/helix/01-frame/user-stories/
  format: markdown
  naming: US-{number}-{slug}.md
  structure: one-per-story

validation:
  required_sections:
    - story
    - context
    - walkthrough
    - acceptance_criteria
    - edge_cases
    - test_scenarios
    - dependencies

  quality_checks:
    - check: persona_specific
      description: Story names a specific persona from the PRD, not a generic role
      severity: blocking

    - check: user_action
      description: '"I want" describes a user action, not a system behavior'
      severity: blocking

    - check: criteria_testable
      description: Every acceptance criterion is independently testable (one Given/When/Then)
      severity: blocking

    - check: test_scenarios_concrete
      description: Test scenarios include concrete values, not placeholders
      severity: blocking

    - check: feature_linked
      description: Story links to parent feature spec by ID
      severity: blocking

    - check: walkthrough_complete
      description: Walkthrough traces a complete path from trigger to outcome
      severity: blocking

    - check: edge_cases_present
      description: At least one edge case is documented
      severity: warning

    - check: scope_bounded
      description: Out of scope excludes something plausible
      severity: warning

workflow:
  creation_order: 3
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Product Owner

relationships:
  derived_from:
    - prd
    - feature-specification

  informs:
    - solution-design
    - test-cases
    - tracker-issues

tags:
  - requirements
  - vertical-slice
  - acceptance
  - design-artifact
