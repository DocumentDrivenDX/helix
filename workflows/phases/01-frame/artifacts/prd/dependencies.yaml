# PRD (Product Requirements Document) Dependencies

artifact:
  name: PRD
  id: prd
  type: document
  phase: frame

description: |
  Authority document defining what to build and why. Bridges the product
  vision (direction) to feature specs (detailed requirements). Every design
  decision and implementation choice should trace back to a PRD requirement.

dependencies:
  requires:
    - input: Product Vision
      type: artifact
      phase: "00-discover"
      path: product-vision
      required: false
      relationship: "informs scope and direction"
    - input: Business Case
      type: artifact
      phase: "00-discover"
      path: business-case
      required: false
      relationship: "justifies investment"

  enables:
    - output: Feature Specifications
      type: artifact
      path: feature-specification
      relationship: "breaks down into features"
    - output: User Stories
      type: artifact
      path: user-stories
      relationship: "derives actionable stories"
    - output: Principles
      type: artifact
      path: principles
      relationship: "establishes design principles"

output:
  location: docs/helix/01-frame/prd.md
  format: markdown

validation:
  required_sections:
    - summary
    - problem_and_goals
    - success_metrics
    - non_goals
    - users_and_scope
    - requirements
    - functional_requirements
    - acceptance_test_sketches
    - technical_context
    - constraints_assumptions_dependencies
    - risks
    - open_questions
    - success_criteria

  quality_checks:
    - check: problem_quantified
      description: Problem section quantifies pain or names a specific failure mode
      severity: blocking

    - check: p0_testable
      description: Every P0 requirement is testable
      severity: blocking

    - check: metrics_measurable
      description: Success metrics have numeric targets and named measurement methods
      severity: blocking

    - check: no_unresolved_markers
      description: No [TBD], [TODO], or [NEEDS CLARIFICATION] markers remain
      severity: blocking

    - check: non_goals_specific
      description: Non-goals exclude something plausible, not just strawmen
      severity: blocking

    - check: personas_specific
      description: Personas are specific enough to validate with a real user
      severity: blocking

    - check: test_sketches_exist
      description: Every P0 requirement has an acceptance test sketch with inputs and expected outputs
      severity: blocking

    - check: p0_count
      description: P0 requirements number 7 or fewer
      severity: warning

    - check: risks_actionable
      description: Risk mitigations are concrete actions, not "monitor"
      severity: warning

    - check: goals_state_changes
      description: Goals describe state changes, not activities
      severity: warning

    - check: tech_context_versioned
      description: Technical Context names specific versions, not just library names
      severity: warning

    - check: open_questions_attributed
      description: Open Questions name who can answer and what's blocked
      severity: warning

workflow:
  creation_order: 1
  review_cycles: 2-3
  approval_required: true
  approvers:
    - Product Owner
    - Technical Lead

relationships:
  informs:
    - feature-specification
    - user-stories
    - principles
    - solution-design

tags:
  - requirements
  - scope
  - priorities
